[[entry]]
key = "plugin.newton_solver"
title = "NewtonSolverProviderPlugin"
kind = "plugin"
import_path = "nsgablack.plugins.evaluation.newton_solver_plugin:NewtonSolverProviderPlugin"
tags = ["evaluation", "solver", "nonlinear", "newton", "plugin"]
summary = "Newton 求解插件：评估阶段的非线性方程求解。 / Newton solver plugin: nonlinear equation solving during evaluation."
use_when = [
  "评估需要求解隐式非线性方程时。 / Use when evaluation requires solving implicit nonlinear equations.",
  "希望替换求解器插件而不改外层循环时。 / Use when you want solver-plugin replacement without touching outer loop.",
]
minimal_wiring = [
  "from nsgablack.plugins import NewtonSolverProviderPlugin, NumericalSolverConfig",
  "solver.register_evaluation_provider(NewtonSolverProviderPlugin(config=NumericalSolverConfig(tol=1e-8, max_iter=100)).build_provider())",
]
required_companions = ["problem hook: build_implicit_system", "problem hook: evaluate_from_implicit_solution"]
config_keys = [
  "tol",
  "max_iter",
  "fallback_to_problem_eval",
  "warn_on_failure",
]
companions = ["plugin.broyden_solver"]
example_entry = "python -m nsgablack catalog search newton_solver --kind plugin"
context_requires = ["problem"]
context_provides = [
  "metrics.implicit_residual",
  "metrics.implicit_iters",
  "metrics.implicit_success",
]
context_mutates = ["metrics"]
context_notes = [
  "Requires problem hooks build_implicit_system(x, ctx) and evaluate_from_implicit_solution(x, y, ctx).",
]

