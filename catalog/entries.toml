[[entry]]
key = "adapter.async_event_driven"
title = "AsyncEventDrivenAdapter"
kind = "adapter"
import_path = "nsgablack.core.adapters.async_event_driven:AsyncEventDrivenAdapter"
tags = ["adapter", "async", "context", "controller", "event", "multi_strategy", "orchestration"]
summary = "异步事件驱动控制器：以事件队列编排 propose/update。 / Adapter: event-queue orchestration for propose/update."
companions = ["plugin.async_event_hub", "plugin.pareto_archive", "suite.async_event_driven"]
context_requires = ["generation"]
context_provides = ["event_queue", "event_inflight", "event_archive", "event_history", "event_shared"]
context_mutates = ["event_queue", "event_inflight", "event_archive", "event_history", "event_shared"]
context_cache = ["event_history", "event_inflight"]
context_notes = ["Queue-based controller; strategy-level updates are driven by completion events."]
use_when = ["需要异步时序语义（事件流）而非代际同步时", "希望多策略协同且保持可审计事件历史时"]
minimal_wiring = [
  "from nsgablack.core.adapters import AsyncEventDrivenAdapter, AsyncEventDrivenConfig, EventStrategySpec",
  "solver.set_adapter(AsyncEventDrivenAdapter(strategies=[...], config=AsyncEventDrivenConfig()))"
]
required_companions = ["plugin.async_event_hub (recommended)", "plugin.pareto_archive (recommended)"]
config_keys = ["total_batch_size", "target_queue_size", "bootstrap_events_per_strategy", "max_queue_size", "refill_events_per_completion"]
example_entry = "examples/async_event_driven_demo.py:build_solver"

[[entry]]
key = "adapter.single_trajectory_adaptive"
title = "SingleTrajectoryAdaptiveAdapter"
kind = "adapter"
import_path = "nsgablack.core.adapters.single_trajectory_adaptive:SingleTrajectoryAdaptiveAdapter"
tags = ["adapter", "adaptive", "local_search", "single_trajectory", "strategy"]
summary = "单轨迹自适应搜索：一条轨迹在线调节邻域尺度。 / Adapter: single-trajectory search with online neighborhood adaptation."
companions = ["suite.single_trajectory_adaptive", "repr.context_gaussian"]
context_requires = ["generation"]
context_provides = ["single_traj_state", "single_traj_sigma"]
context_mutates = ["single_traj_state", "single_traj_sigma"]
context_cache = []
context_notes = ["Maintains one active trajectory; adapts mutation_sigma from success rate."]
use_when = ["需要比种群法更轻量的单轨迹搜索时", "希望快速迭代并自动调节局部步长时"]
minimal_wiring = [
  "from nsgablack.core.adapters import SingleTrajectoryAdaptiveAdapter, SingleTrajectoryAdaptiveConfig",
  "solver.set_adapter(SingleTrajectoryAdaptiveAdapter(SingleTrajectoryAdaptiveConfig()))"
]
required_companions = ["repr.context_gaussian (recommended)"]
config_keys = ["batch_size", "initial_sigma", "target_success_rate", "restart_patience", "accept_worse_prob"]
example_entry = "examples/single_trajectory_adaptive_demo.py:build_solver"

