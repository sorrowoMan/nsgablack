summary = "事件队列编排：驱动 propose/update。 / Adapter: event-queue orchestration for propose/update."
use_when = [
  "需要异步时序语义（事件流）而非代级同步时。 / Need async temporal semantics (event stream) instead of generation-level sync.",
  "需要多策略协同且可审计事件历史时。 / Need multi-strategy coordination with auditable event history.",
]
minimal_wiring = [
  "from nsgablack.adapters import AsyncEventDrivenAdapter, AsyncEventDrivenConfig, EventStrategySpec",
  "solver.set_adapter(AsyncEventDrivenAdapter(strategies=[...], config=AsyncEventDrivenConfig()))",
]
required_companions = ["plugin.async_event_hub (recommended)", "plugin.pareto_archive (recommended)"]
config_keys = [
  "total_batch_size",
  "target_queue_size",
  "bootstrap_events_per_strategy",
  "max_queue_size",
  "refill_events_per_completion",
]
companions = ["plugin.async_event_hub", "plugin.pareto_archive"]
example_entry = "examples/async_event_driven_demo.py:build_solver"
context_requires = ["generation"]
context_provides = [
  "event_queue",
  "event_inflight",
  "event_archive",
  "event_history",
  "event_shared",
]
