[[entry]]
key = "runtime.inner_evaluator"
title = "TaskInnerRuntimeEvaluator"
kind = "plugin"
import_path = "nsgablack.core.nested_solver:TaskInnerRuntimeEvaluator"
tags = ["runtime", "nested", "inner", "evaluation", "contract"]
summary = "问题侧内层运行评估器：通过 problem.inner_runtime_evaluator 执行嵌套评估。 / Problem-side inner runtime evaluator: executes nested evaluation through problem.inner_runtime_evaluator."
use_when = [
  "评估本身是嵌套的优化流程时。 / Evaluation itself is a nested optimization workflow.",
  "需要 L1/L2/L3 分层评估契约时。 / You need L1/L2/L3 layered evaluation contracts.",
]
minimal_wiring = [
  "from nsgablack.core.nested_solver import InnerRuntimeConfig, TaskInnerRuntimeEvaluator",
  "solver.problem.inner_runtime_evaluator = TaskInnerRuntimeEvaluator(config=InnerRuntimeConfig(source_layer='L2', target_layer='L1'))",
]
required_companions = ["problem hook: evaluate_from_inner_result (recommended)"]
config_keys = [
  "source_layer",
  "target_layer",
  "fallback_penalty",
  "warn_on_failure",
  "max_retries",
  "per_call_timeout_ms",
  "retry_backoff_ms",
]
companions = ["plugin.contract_bridge", "plugin.inner_timeout_budget"]
example_entry = "python -m nsgablack catalog search inner_runtime --kind plugin"
context_requires = ["problem"]
context_provides = [
  "metrics.inner_calls",
  "metrics.inner_status",
  "metrics.inner_elapsed_ms",
]
context_mutates = ["metrics"]
context_notes = [
  "Configured at problem level (solver.problem.inner_runtime_evaluator), not via solver.add_plugin().",
]

