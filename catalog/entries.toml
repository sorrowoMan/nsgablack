[[entry]]
key = "plugin.contract_bridge"
title = "ContractBridgePlugin"
kind = "plugin"
import_path = "nsgablack.plugins.solver_backends.contract_bridge:ContractBridgePlugin"
tags = ["evaluation", "nested", "bridge", "contract", "plugin"]
summary = "契约桥接插件：跨层映射内层结果字段。 / Contract bridge plugin: maps inner result fields across layers."
use_when = [
  "需要跨层回写（如 L3 -> L1）时。 / Use when cross-layer write-back is required (e.g., L3 -> L1).",
  "内外层契约必须保持解耦时。 / Use when inner/outer contracts must stay decoupled.",
]
minimal_wiring = [
  "from nsgablack.plugins import ContractBridgePlugin, BridgeRule",
  "solver.add_plugin(ContractBridgePlugin(rules=[BridgeRule('objective', 'inner_objective', target_layer='L1')]))",
]
required_companions = ["runtime.inner_evaluator"]
config_keys = ["rules", "allow_overwrite"]
companions = ["plugin.inner_timeout_budget", "runtime.inner_evaluator"]
example_entry = "python -m nsgablack catalog search contract_bridge --kind plugin"
context_mutates = ["metadata.layers"]
context_notes = [
  "Consumes on_inner_result packets and writes mapped keys into solver._layer_contexts.",
]

