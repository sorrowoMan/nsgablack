[[entry]]
key = "plugin.monte_carlo_eval"
title = "MonteCarloEvaluationProviderPlugin"
kind = "plugin"
import_path = "nsgablack.plugins.evaluation.monte_carlo_evaluation:MonteCarloEvaluationProviderPlugin"
tags = ["evaluation", "mc", "robustness", "plugin"]
summary = "基于扰动的蒙特卡洛评估与指标统计。 / Plugin: perturbation-based Monte Carlo evaluation with metrics."
use_when = [
  "需要超越单次幸运结果的鲁棒性对比时。 / Need robustness comparison beyond single lucky outcomes.",
  "扰动/噪声下需要统计意义的评估时。 / Need statistically meaningful evaluation under perturbations/noise.",
]
minimal_wiring = [
  "from nsgablack.plugins import MonteCarloEvaluationProviderPlugin, MonteCarloEvaluationConfig",
  "solver.register_evaluation_provider(MonteCarloEvaluationProviderPlugin(config=MonteCarloEvaluationConfig(n_samples=16)).build_provider())",
]
required_companions = ["bias.robustness"]
config_keys = [
  "n_samples",
  "noise_std",
  "aggregation",
  "seed",
  "parallel",
]
companions = ["bias.robustness"]
example_entry = "examples/monte_carlo_dp_robust_demo.py:build_solver"
context_provides = [
  "metrics.mc_samples",
  "metrics.mc_mean",
  "metrics.mc_std",
  "metrics.mc_min",
  "metrics.mc_max",
]
context_mutates = ["metrics"]

