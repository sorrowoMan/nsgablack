name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: |
          python -m pytest

  lint:
    name: lint (black + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Catalog contracts
        run: |
          python tools/catalog_integrity_checker.py --check-usage --strict-usage --check-context --context-kinds plugin --require-context-notes --strict-context

      - name: Project doctor (strict)
        run: |
          python -m nsgablack project doctor --path . --strict
          python -m nsgablack project doctor --path examples/cases/production_scheduling --build --strict

      - name: Context/Schema governance
        run: |
          python -m pytest -q tests/test_context_key_alignment.py tests/test_schema_version.py tests/test_context_field_guard.py
          python tools/context_field_guard.py --strict
          python tools/schema_tool.py --strict runs

      - name: Black
        run: |
          python -m black --check .

      - name: Mypy
        run: |
          python -m mypy .
