name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quick-health:
    name: quick-health (core regression signals)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Quick regression checks
        run: |
          python -m pytest -q tests/test_refactoring.py tests/test_tomli_fallback.py tests/test_optional_numba_probe.py
          python -m nsgablack project doctor --path . --strict
          python tools/catalog_integrity_checker.py --check-usage --strict-usage --check-context --context-kinds plugin --require-context-notes --strict-context --check-context-conflicts --strict-context-conflicts --context-conflicts-waiver tools/context_conflicts_waiver.txt
          python tools/context_field_guard.py --strict

  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Debug import target
        run: |
          git rev-parse HEAD
          python -c "from pathlib import Path; p=Path('bias/managers/meta_learning_selector.py'); lines=p.read_text(encoding='utf-8').splitlines(); print('\n'.join(f'{i+1}: {lines[i]}' for i in range(min(12, len(lines)))))"

      - name: Run tests
        run: |
          python -m pytest

  lint:
    name: lint (black + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Catalog contracts
        run: |
          python tools/catalog_integrity_checker.py --check-usage --strict-usage --check-context --context-kinds plugin --require-context-notes --strict-context --check-context-conflicts --strict-context-conflicts --context-conflicts-waiver tools/context_conflicts_waiver.txt

      - name: Project doctor (strict)
        run: |
          python -m nsgablack project doctor --path . --strict
          python -m nsgablack project doctor --path examples/cases/production_scheduling --build --strict

      - name: Repository root hygiene
        run: |
          python tools/check_repo_root_hygiene.py --root .

      - name: Context/Schema governance
        run: |
          python -m pytest -q tests/test_context_key_alignment.py tests/test_schema_version.py tests/test_context_field_guard.py
          python tools/context_field_guard.py --strict
          python tools/schema_tool.py --strict runs

      - name: Black
        run: |
          python -m black --check .

      - name: Mypy
        run: |
          python -m mypy .
